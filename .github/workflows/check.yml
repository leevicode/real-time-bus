name: Linting

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint backend
        run: nix develop --command bash -c "cd backend && npm run lint"
      - name: Lint frontend
        run: nix develop --command bash -c "cd app && npm run lint"
