name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend (Nix)
        run: |
          nix build .#server
          mkdir deploy
          cp -rL result/* deploy/
          find deploy -type l -delete

      - name: Build frontend (Nix)
        run: |
          nix build .#app
          mkdir frontend-dist
          cp -rL result/dist/* frontend-dist/

      - name: Merge frontend into backend's dist folder
        run: |
          mkdir -p deploy/dist
          cp -r frontend-dist/* deploy/dist/

      - name: Package deployment zip
        run: |
          cd deploy
          zip -r ../deploy.zip .

      - name: Deploy to Azure Web App (using publish profile)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
